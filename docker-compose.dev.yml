version: '3.9'

services:
  # MongoDB
  mongo:
    image: mongo:7.0
    container_name: dating02-mongo-dev
    restart: unless-stopped
    volumes:
      - mongo_data_dev:/data/db
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: dating02
    networks:
      - dating02-dev-network

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: dating02-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - dating02-dev-network

  # Backend in dev mode
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: dating02-backend-dev
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    ports:
      - '4000:4000'
    volumes:
      - ./backend/src:/app/src
      - ./backend/.env:/app/.env
    environment:
      PORT: 4000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/dating02
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - dating02-dev-network

volumes:
  mongo_data_dev:

networks:
  dating02-dev-network:
    driver: bridge
